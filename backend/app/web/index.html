<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wanderly · AI Travel Recommendations</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <!-- Leaflet for maps (OpenStreetMap tiles, no API key required) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- React + Babel via CDN: real React, no build step needed -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    // Pin the JSX transform to the classic runtime (React.createElement) so the
    // transpiled output has no ES-module imports and runs in a plain <script>.
    Babel.registerPreset("react-classic", {
      presets: [[Babel.availablePresets["react"], { runtime: "classic" }]],
    });
  </script>
</head>
<body>
  <div id="root"><div class="loading">Loading Wanderly…</div></div>
  <script type="text/babel" data-presets="react-classic" src="/static/app.js"></script>
</body>
</html>
