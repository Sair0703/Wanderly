<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 330" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <rect width="880" height="330" rx="16" fill="#fbfbfd"/>
  <text x="30" y="42" fill="#14141a" font-size="20" font-weight="800">🧭 Wanderly — architecture</text>
  <text x="30" y="64" fill="#6b6b78" font-size="13">AI-native travel platform: personalized search, itineraries, and real inventory.</text>

  <!-- Frontend -->
  <rect x="30" y="90" width="180" height="200" rx="12" fill="#ffffff" stroke="#e6a6b6"/>
  <text x="120" y="116" fill="#ff385c" font-size="14" font-weight="800" text-anchor="middle">React SPA</text>
  <text x="120" y="142" fill="#444" font-size="11.5" text-anchor="middle">Explore + search</text>
  <text x="120" y="162" fill="#444" font-size="11.5" text-anchor="middle">AI Concierge (chat)</text>
  <text x="120" y="182" fill="#444" font-size="11.5" text-anchor="middle">Trip planner + maps</text>
  <text x="120" y="202" fill="#444" font-size="11.5" text-anchor="middle">Reviews · wishlists</text>
  <text x="120" y="222" fill="#444" font-size="11.5" text-anchor="middle">Analytics dashboard</text>

  <!-- Backend -->
  <rect x="260" y="90" width="200" height="200" rx="12" fill="#ffffff" stroke="#9db8b5"/>
  <text x="360" y="116" fill="#0d9488" font-size="14" font-weight="800" text-anchor="middle">FastAPI backend</text>
  <text x="360" y="142" fill="#444" font-size="11.5" text-anchor="middle">Recommendation engine</text>
  <text x="360" y="162" fill="#444" font-size="11.5" text-anchor="middle">NL concierge parser</text>
  <text x="360" y="182" fill="#444" font-size="11.5" text-anchor="middle">Itinerary planner</text>
  <text x="360" y="202" fill="#444" font-size="11.5" text-anchor="middle">Auth · bookings · reviews</text>
  <text x="360" y="222" fill="#444" font-size="11.5" text-anchor="middle">Search + cache</text>

  <!-- Data / infra -->
  <rect x="510" y="90" width="160" height="95" rx="12" fill="#ffffff" stroke="#cdd0da"/>
  <text x="590" y="116" fill="#14141a" font-size="13" font-weight="800" text-anchor="middle">Data</text>
  <text x="590" y="140" fill="#444" font-size="11.5" text-anchor="middle">PostgreSQL / SQLite</text>
  <text x="590" y="160" fill="#444" font-size="11.5" text-anchor="middle">Redis / in-mem cache</text>

  <rect x="510" y="195" width="160" height="95" rx="12" fill="#ffffff" stroke="#cdd0da"/>
  <text x="590" y="221" fill="#14141a" font-size="13" font-weight="800" text-anchor="middle">External</text>
  <text x="590" y="245" fill="#444" font-size="11.5" text-anchor="middle">OpenStreetMap (stays,</text>
  <text x="590" y="262" fill="#444" font-size="11.5" text-anchor="middle">attractions) · LLM</text>

  <!-- Booking out -->
  <rect x="720" y="140" width="130" height="100" rx="12" fill="#fff1f4" stroke="#e6a6b6"/>
  <text x="785" y="184" fill="#ff385c" font-size="12.5" font-weight="800" text-anchor="middle">Booking.com</text>
  <text x="785" y="204" fill="#6b6b78" font-size="11" text-anchor="middle">affiliate links</text>

  <g stroke="#c9ccd6" stroke-width="2" fill="none" marker-end="url(#a)">
    <path d="M210 190 H256"/>
    <path d="M460 150 H506"/>
    <path d="M460 235 H506"/>
    <path d="M670 190 H716"/>
  </g>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0 0 L7 3.5 L0 7 z" fill="#c9ccd6"/>
    </marker>
  </defs>
  <text x="30" y="315" fill="#8a8a96" font-size="11.5">Worldwide real inventory (on-demand geocode + fetch) · price intelligence · shareable trips · 20 passing tests.</text>
</svg>
