# One-click live demo. Render reads this blueprint — no API key required
# (Wanderly's AI features run on a built-in offline model by default).
# For the full production stack (PostgreSQL + Redis + Docker) see docker-compose.yml.
services:
  - type: web
    name: wanderly
    runtime: python
    plan: free                # free tier sleeps when idle; upgrade for always-on
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: demo
      - key: SECRET_KEY
        generateValue: true   # random, kept by Render
      - key: FORCE_HTTPS
        value: "true"
      - key: DATA_PROVIDER
        value: osm            # real stays + attractions from OpenStreetMap
      - key: SEED_DEMO_USERS
        value: "true"         # demo login so visitors can try personalization
      # Optional: set a Groq/OpenAI/Anthropic key for real AI itineraries.
      # - key: LLM_PROVIDER
      #   value: openai
      # - key: OPENAI_API_KEY
      #   sync: false
